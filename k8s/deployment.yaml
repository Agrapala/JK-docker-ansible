apiVersion: apps/v1
kind: Deployment
metadata:
  name: essay-app
  labels:
    app: essay-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: essay-app
  template:
    metadata:
      labels:
        app: essay-app
    spec:
      containers:
        - name: essay-app
          image: docker.io/your-user/essay-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: FLASK_HOST
              value: 0.0.0.0
            - name: FLASK_PORT
              value: "5000"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          readinessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
