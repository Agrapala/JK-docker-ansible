- hosts: local
  become: no
  vars:
    k8s_image: "docker.io/your-user/essay-app:latest"
  tasks:
    - name: Apply Kubernetes deployment
      command: kubectl apply -f k8s/deployment.yaml
      args:
        chdir: "{{ playbook_dir }}/.."

    - name: Apply Kubernetes service
      command: kubectl apply -f k8s/service.yaml
      args:
        chdir: "{{ playbook_dir }}/.."

    - name: Set deployment image
      command: >
        kubectl set image deployment/essay-app
        essay-app={{ k8s_image }}
      args:
        chdir: "{{ playbook_dir }}/.."

    - name: Wait for rollout
      command: kubectl rollout status deployment/essay-app --timeout=120s
      args:
        chdir: "{{ playbook_dir }}/.."